name: Terraform Prod

on:
  pull_request:
    paths:
      - 'terraform/environments/prod/**'
      - 'terraform/modules/**'
      - 'helm/**'
      - '.github/workflows/terraform-prod.yml'
  push:
    branches:
      - main
    paths:
      - 'terraform/environments/prod/**'
      - 'terraform/modules/**'
      - 'helm/**'
      - '.github/workflows/terraform-prod.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

env:
  TF_DIR: terraform/environments/prod
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: openproject-prod-eks
  HELM_RELEASE_NAME: plane-dev
  K8S_NAMESPACE: plane-dev
  HELM_CHART_DIR: helm/plane
  HELM_VALUES_FILE: helm/plane/values/dev.yaml
  PLANE_DOCSTORE_SECRET_NAME: plane-dev-doc-store-secrets

concurrency:
  group: terraform-prod-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  validate-plan:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure RDS Service-Linked Role
        run: |
          set -euo pipefail
          if aws iam get-role --role-name AWSServiceRoleForRDS >/dev/null 2>&1; then
            echo "AWSServiceRoleForRDS already exists."
          else
            echo "Creating AWSServiceRoleForRDS..."
            aws iam create-service-linked-role --aws-service-name rds.amazonaws.com
          fi

      - name: Terraform Init
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          terraform -chdir=${{ env.TF_DIR }} init -input=false \
            -backend-config="bucket=openproject-cloud-platform-tfstate-${ACCOUNT_ID}" \
            -backend-config="dynamodb_table=openproject-cloud-platform-tf-locks"

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: Terraform Plan
        run: terraform -chdir=${{ env.TF_DIR }} plan -input=false -out=tfplan

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Dependency Update
        run: helm dependency update "${{ env.HELM_CHART_DIR }}"

      - name: Helm Lint
        run: helm lint "${{ env.HELM_CHART_DIR }}" --values "${{ env.HELM_VALUES_FILE }}"

      - name: Helm Template Validate
        run: helm template "${{ env.HELM_RELEASE_NAME }}" "${{ env.HELM_CHART_DIR }}" --namespace "${{ env.K8S_NAMESPACE }}" --values "${{ env.HELM_VALUES_FILE }}" > /dev/null

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan

  apply:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    needs: validate-plan
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          terraform -chdir=${{ env.TF_DIR }} init -input=false \
            -backend-config="bucket=openproject-cloud-platform-tfstate-${ACCOUNT_ID}" \
            -backend-config="dynamodb_table=openproject-cloud-platform-tf-locks"

      - name: Terraform Apply
        run: terraform -chdir=${{ env.TF_DIR }} apply -input=false -auto-approve

      - name: Configure kubectl context
        run: aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Dependency Update
        run: helm dependency update "${{ env.HELM_CHART_DIR }}"

      - name: Ensure namespace exists
        run: kubectl get namespace "${{ env.K8S_NAMESPACE }}" || kubectl create namespace "${{ env.K8S_NAMESPACE }}"

      - name: Read Terraform Outputs
        id: tf_outputs
        run: |
          echo "vpc_id=$(terraform -chdir=${{ env.TF_DIR }} output -raw vpc_id)" >> "$GITHUB_OUTPUT"
          echo "plane_docstore_bucket_name=$(terraform -chdir=${{ env.TF_DIR }} output -raw plane_docstore_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "plane_irsa_role_arn=$(terraform -chdir=${{ env.TF_DIR }} output -raw plane_irsa_role_arn)" >> "$GITHUB_OUTPUT"
          echo "aws_load_balancer_controller_irsa_role_arn=$(terraform -chdir=${{ env.TF_DIR }} output -raw eks_aws_load_balancer_controller_irsa_role_arn)" >> "$GITHUB_OUTPUT"

      - name: Install/Upgrade AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="${{ env.EKS_CLUSTER_NAME }}" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set-string serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn="${{ steps.tf_outputs.outputs.aws_load_balancer_controller_irsa_role_arn }}" \
            --set region="${{ env.AWS_REGION }}" \
            --set vpcId="${{ steps.tf_outputs.outputs.vpc_id }}" \
            --wait \
            --timeout 10m
          kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=5m

      - name: Adopt Existing Plane Doc Store Secret (if present)
        run: |
          if kubectl get secret "${{ env.PLANE_DOCSTORE_SECRET_NAME }}" -n "${{ env.K8S_NAMESPACE }}" >/dev/null 2>&1; then
            kubectl label secret "${{ env.PLANE_DOCSTORE_SECRET_NAME }}" \
              -n "${{ env.K8S_NAMESPACE }}" \
              app.kubernetes.io/managed-by=Helm \
              --overwrite
            kubectl annotate secret "${{ env.PLANE_DOCSTORE_SECRET_NAME }}" \
              -n "${{ env.K8S_NAMESPACE }}" \
              meta.helm.sh/release-name="${{ env.HELM_RELEASE_NAME }}" \
              meta.helm.sh/release-namespace="${{ env.K8S_NAMESPACE }}" \
              --overwrite
          fi

      - name: Helm Upgrade/Install
        run: |
          helm upgrade --install "${{ env.HELM_RELEASE_NAME }}" "${{ env.HELM_CHART_DIR }}" \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --values "${{ env.HELM_VALUES_FILE }}" \
            --set-string plane-ce.env.docstore_bucket="${{ steps.tf_outputs.outputs.plane_docstore_bucket_name }}" \
            --set-string plane-ce.env.aws_region="${{ env.AWS_REGION }}" \
            --set-string plane-ce.env.aws_s3_endpoint_url="${{ secrets.PLANE_S3_ENDPOINT_URL }}" \
            --atomic \
            --wait \
            --timeout 20m

      - name: Annotate Plane Service Account (IRSA)
        run: |
          kubectl annotate serviceaccount "${{ env.HELM_RELEASE_NAME }}-srv-account" \
            -n "${{ env.K8S_NAMESPACE }}" \
            eks.amazonaws.com/role-arn="${{ steps.tf_outputs.outputs.plane_irsa_role_arn }}" \
            --overwrite

      - name: Restart Plane Workloads After IRSA Annotation
        run: |
          for deploy in "${{ env.HELM_RELEASE_NAME }}-api-wl" "${{ env.HELM_RELEASE_NAME }}-live-wl" "${{ env.HELM_RELEASE_NAME }}-worker-wl" "${{ env.HELM_RELEASE_NAME }}-beat-worker-wl" "${{ env.HELM_RELEASE_NAME }}-web-wl" "${{ env.HELM_RELEASE_NAME }}-admin-wl" "${{ env.HELM_RELEASE_NAME }}-space-wl"; do
            kubectl rollout restart "deployment/${deploy}" -n "${{ env.K8S_NAMESPACE }}" || true
          done
          for deploy in "${{ env.HELM_RELEASE_NAME }}-api-wl" "${{ env.HELM_RELEASE_NAME }}-live-wl" "${{ env.HELM_RELEASE_NAME }}-worker-wl" "${{ env.HELM_RELEASE_NAME }}-beat-worker-wl" "${{ env.HELM_RELEASE_NAME }}-web-wl" "${{ env.HELM_RELEASE_NAME }}-admin-wl" "${{ env.HELM_RELEASE_NAME }}-space-wl"; do
            kubectl rollout status "deployment/${deploy}" -n "${{ env.K8S_NAMESPACE }}" --timeout=5m || true
          done
