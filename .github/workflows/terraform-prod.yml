name: Terraform Prod

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

env:
  TF_DIR: terraform/environments/prod
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || '' }}
  TF_STATE_BUCKET_PREFIX: ${{ vars.TF_STATE_BUCKET_PREFIX || 'plane-cloud-platform-tfstate' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'prod/terraform.tfstate' }}
  TF_LOCK_TABLE_NAME: ${{ vars.TF_LOCK_TABLE_NAME || 'plane-cloud-platform-tf-locks' }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'eu-west-1' }}
  TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'plane' }}
  TF_VAR_environment: ${{ vars.DEPLOY_ENVIRONMENT || 'prod' }}
  TF_VAR_postgres_mode: ${{ vars.POSTGRES_MODE || 'aws-managed' }}
  TF_VAR_redis_mode: ${{ vars.REDIS_MODE || 'aws-managed' }}
  TF_VAR_rabbitmq_mode: ${{ vars.RABBITMQ_MODE || 'aws-managed' }}
  TF_VAR_object_store_mode: ${{ vars.OBJECT_STORE_MODE || 's3-managed' }}
  TF_VAR_plane_namespace: ${{ vars.K8S_NAMESPACE || 'plane' }}
  TF_VAR_plane_service_account_name: ${{ format('{0}-srv-account', vars.HELM_RELEASE_NAME || 'plane') }}
  TF_VAR_eks_cluster_admin_principal_arns: '["${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}"]'
  POSTGRES_MODE: ${{ vars.POSTGRES_MODE || 'aws-managed' }}
  REDIS_MODE: ${{ vars.REDIS_MODE || 'aws-managed' }}
  RABBITMQ_MODE: ${{ vars.RABBITMQ_MODE || 'aws-managed' }}
  OBJECT_STORE_MODE: ${{ vars.OBJECT_STORE_MODE || 's3-managed' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || format('{0}-{1}-eks', vars.PROJECT_NAME || 'plane', vars.DEPLOY_ENVIRONMENT || 'prod') }}
  HELM_RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME || 'plane' }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'plane' }}
  PLANE_SERVICE_ACCOUNT_NAME: ${{ format('{0}-srv-account', vars.HELM_RELEASE_NAME || 'plane') }}
  HELM_CHART_DIR: helm/plane
  HELM_VALUES_FILE: helm/plane/values/dev.yaml
  PLANE_DOCSTORE_SECRET_NAME: ${{ vars.PLANE_DOCSTORE_SECRET_NAME || format('{0}-doc-store-secrets', vars.HELM_RELEASE_NAME || 'plane') }}
  PLANE_APP_HOST: ${{ vars.PLANE_APP_HOST || '' }}

concurrency:
  group: terraform-prod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  validate-plan:
    if: github.event.inputs.action == 'plan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Terraform Backend
        id: backend
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="${TF_STATE_BUCKET:-${{ env.TF_STATE_BUCKET_PREFIX }}-${ACCOUNT_ID}}"
          echo "state_bucket=${STATE_BUCKET}" >> "$GITHUB_OUTPUT"

          if aws s3api head-bucket --bucket "${STATE_BUCKET}" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Terraform backend bucket '${STATE_BUCKET}' is not available. Run Terraform Bootstrap with action=apply before remote-backed production plans."
          fi

      - name: Require Backend For Manual Plan
        if: github.event_name == 'workflow_dispatch' && steps.backend.outputs.available != 'true'
        run: |
          echo "Terraform backend bucket '${{ steps.backend.outputs.state_bucket }}' is not available."
          echo "Run Terraform Bootstrap with action=apply, then rerun Terraform Prod with action=plan."
          exit 1

      - name: Terraform Init
        if: steps.backend.outputs.available == 'true'
        run: |
          terraform -chdir=${{ env.TF_DIR }} init -input=false \
            -backend-config="bucket=${{ steps.backend.outputs.state_bucket }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE_NAME }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Init Without Backend
        if: steps.backend.outputs.available != 'true'
        run: terraform -chdir=${{ env.TF_DIR }} init -backend=false -input=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: Terraform Plan
        if: steps.backend.outputs.available == 'true'
        run: terraform -chdir=${{ env.TF_DIR }} plan -input=false -out=tfplan

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Dependency Build
        run: |
          helm repo add makeplane https://helm.plane.so --force-update
          helm dependency build "${{ env.HELM_CHART_DIR }}"

      - name: Helm Lint
        run: |
          helm lint "${{ env.HELM_CHART_DIR }}" \
            --values "${{ env.HELM_VALUES_FILE }}" \
            --set-string plane-ce.env.pgdb_remote_url="postgresql://ci:ci@example.invalid:5432/plane" \
            --set-string plane-ce.env.remote_redis_url="rediss://:ci@example.invalid:6379/0" \
            --set-string plane-ce.rabbitmq.external_rabbitmq_url="amqps://ci:ci@example.invalid:5671/" \
            --set-string plane-ce.env.docstore_bucket="ci-docstore" \
            --set-string plane-ce.env.secret_key="ci-template-secret-key" \
            --set-string plane-ce.env.live_server_secret_key="ci-template-live-secret-key"

      - name: Helm Template Validate
        run: |
          helm template "${{ env.HELM_RELEASE_NAME }}" "${{ env.HELM_CHART_DIR }}" \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --values "${{ env.HELM_VALUES_FILE }}" \
            --set-string plane-ce.env.pgdb_remote_url="postgresql://ci:ci@example.invalid:5432/plane" \
            --set-string plane-ce.env.remote_redis_url="rediss://:ci@example.invalid:6379/0" \
            --set-string plane-ce.rabbitmq.external_rabbitmq_url="amqps://ci:ci@example.invalid:5671/" \
            --set-string plane-ce.env.docstore_bucket="ci-docstore" \
            --set-string plane-ce.env.secret_key="ci-template-secret-key" \
            --set-string plane-ce.env.live_server_secret_key="ci-template-live-secret-key" \
            > /dev/null

  apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure AWS Service-Linked Roles
        run: |
          set -euo pipefail
          services=(
            "eks.amazonaws.com:AWSServiceRoleForAmazonEKS"
            "eks-nodegroup.amazonaws.com:AWSServiceRoleForAmazonEKSNodegroup"
          )
          if [ "${POSTGRES_MODE}" = "aws-managed" ]; then
            services+=("rds.amazonaws.com:AWSServiceRoleForRDS")
          fi
          if [ "${RABBITMQ_MODE}" = "aws-managed" ]; then
            services+=("mq.amazonaws.com:AWSServiceRoleForAmazonMQ")
          fi
          if [ "${REDIS_MODE}" = "aws-managed" ]; then
            services+=("elasticache.amazonaws.com:AWSServiceRoleForElastiCache")
          fi
          for entry in "${services[@]}"; do
            IFS=':' read -r service_name role_name <<< "$entry"
            if aws iam get-role --role-name "$role_name" >/dev/null 2>&1; then
              echo "$role_name already exists."
            else
              echo "Creating $role_name for $service_name..."
              aws iam create-service-linked-role --aws-service-name "$service_name"
            fi
          done

      - name: Terraform Init
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="${TF_STATE_BUCKET:-${{ env.TF_STATE_BUCKET_PREFIX }}-${ACCOUNT_ID}}"
          terraform -chdir=${{ env.TF_DIR }} init -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE_NAME }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        run: terraform -chdir=${{ env.TF_DIR }} apply -input=false -auto-approve

      - name: Configure kubectl context
        run: aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Dependency Build
        run: |
          helm repo add makeplane https://helm.plane.so --force-update
          helm dependency build "${{ env.HELM_CHART_DIR }}"

      - name: Ensure namespace exists
        run: kubectl get namespace "${{ env.K8S_NAMESPACE }}" || kubectl create namespace "${{ env.K8S_NAMESPACE }}"

      - name: Read Terraform Outputs
        id: tf_outputs
        run: |
          set -euo pipefail

          require_nonempty() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Required Terraform output '$name' is empty."
              exit 1
            fi
          }

          require_iam_role_arn() {
            local name="$1"
            local value="$2"
            if [[ ! "$value" =~ ^arn:aws:iam::[0-9]{12}:role/.+ ]]; then
              echo "Terraform output '$name' is not a valid IAM role ARN: '$value'"
              exit 1
            fi
          }

          output_raw_or_empty() {
            local name="$1"
            terraform -chdir=${{ env.TF_DIR }} output -raw "$name" 2>/dev/null || true
          }

          VPC_ID="$(terraform -chdir=${{ env.TF_DIR }} output -raw vpc_id)"
          NODE_GROUP_NAME="$(terraform -chdir=${{ env.TF_DIR }} output -raw eks_node_group_name)"
          PLANE_APP_SECRET_ARN="$(terraform -chdir=${{ env.TF_DIR }} output -raw plane_app_secret_arn)"
          AWS_LBC_IRSA_ROLE_ARN="$(terraform -chdir=${{ env.TF_DIR }} output -raw eks_aws_load_balancer_controller_irsa_role_arn)"
          CLUSTER_AUTOSCALER_IRSA_ROLE_ARN="$(output_raw_or_empty eks_cluster_autoscaler_irsa_role_arn)"
          DOCSTORE_BUCKET=""
          PLANE_IRSA_ROLE_ARN=""
          RDS_SECRET_ARN=""
          RABBITMQ_SECRET_ARN=""
          REDIS_SECRET_ARN=""

          if [ -z "$CLUSTER_AUTOSCALER_IRSA_ROLE_ARN" ]; then
            ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
            CLUSTER_AUTOSCALER_IRSA_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${{ env.EKS_CLUSTER_NAME }}-cluster-autoscaler-role"
            echo "eks_cluster_autoscaler_irsa_role_arn output not found in state; using fallback ARN: ${CLUSTER_AUTOSCALER_IRSA_ROLE_ARN}"
          fi

          require_nonempty "vpc_id" "$VPC_ID"
          require_nonempty "eks_node_group_name" "$NODE_GROUP_NAME"
          require_nonempty "plane_app_secret_arn" "$PLANE_APP_SECRET_ARN"
          require_iam_role_arn "eks_aws_load_balancer_controller_irsa_role_arn" "$AWS_LBC_IRSA_ROLE_ARN"
          require_iam_role_arn "eks_cluster_autoscaler_irsa_role_arn" "$CLUSTER_AUTOSCALER_IRSA_ROLE_ARN"

          if [ "${POSTGRES_MODE}" = "aws-managed" ]; then
            RDS_SECRET_ARN="$(terraform -chdir=${{ env.TF_DIR }} output -raw rds_credentials_secret_arn)"
            require_nonempty "rds_credentials_secret_arn" "$RDS_SECRET_ARN"
          fi
          if [ "${RABBITMQ_MODE}" = "aws-managed" ]; then
            RABBITMQ_SECRET_ARN="$(terraform -chdir=${{ env.TF_DIR }} output -raw rabbitmq_credentials_secret_arn)"
            require_nonempty "rabbitmq_credentials_secret_arn" "$RABBITMQ_SECRET_ARN"
          fi
          if [ "${REDIS_MODE}" = "aws-managed" ]; then
            REDIS_SECRET_ARN="$(terraform -chdir=${{ env.TF_DIR }} output -raw redis_credentials_secret_arn)"
            require_nonempty "redis_credentials_secret_arn" "$REDIS_SECRET_ARN"
          fi
          if [ "${OBJECT_STORE_MODE}" = "s3-managed" ]; then
            DOCSTORE_BUCKET="$(terraform -chdir=${{ env.TF_DIR }} output -raw plane_docstore_bucket_name)"
            PLANE_IRSA_ROLE_ARN="$(terraform -chdir=${{ env.TF_DIR }} output -raw plane_irsa_role_arn)"
            require_nonempty "plane_docstore_bucket_name" "$DOCSTORE_BUCKET"
            require_iam_role_arn "plane_irsa_role_arn" "$PLANE_IRSA_ROLE_ARN"
          fi

          echo "vpc_id=$VPC_ID" >> "$GITHUB_OUTPUT"
          echo "eks_node_group_name=$NODE_GROUP_NAME" >> "$GITHUB_OUTPUT"
          echo "plane_docstore_bucket_name=$DOCSTORE_BUCKET" >> "$GITHUB_OUTPUT"
          echo "plane_irsa_role_arn=$PLANE_IRSA_ROLE_ARN" >> "$GITHUB_OUTPUT"
          echo "rds_credentials_secret_arn=$RDS_SECRET_ARN" >> "$GITHUB_OUTPUT"
          echo "rabbitmq_credentials_secret_arn=$RABBITMQ_SECRET_ARN" >> "$GITHUB_OUTPUT"
          echo "redis_credentials_secret_arn=$REDIS_SECRET_ARN" >> "$GITHUB_OUTPUT"
          echo "plane_app_secret_arn=$PLANE_APP_SECRET_ARN" >> "$GITHUB_OUTPUT"
          echo "aws_load_balancer_controller_irsa_role_arn=$AWS_LBC_IRSA_ROLE_ARN" >> "$GITHUB_OUTPUT"
          echo "cluster_autoscaler_irsa_role_arn=$CLUSTER_AUTOSCALER_IRSA_ROLE_ARN" >> "$GITHUB_OUTPUT"

      - name: Verify Cluster Autoscaler IRSA Role Exists
        run: |
          set -euo pipefail
          ROLE_ARN="${{ steps.tf_outputs.outputs.cluster_autoscaler_irsa_role_arn }}"
          ROLE_NAME="${ROLE_ARN##*/}"
          aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text >/dev/null

      - name: Resolve Node Group ASG For Cluster Autoscaler
        id: nodegroup_scaling
        if: steps.tf_outputs.outputs.cluster_autoscaler_irsa_role_arn != ''
        run: |
          set -euo pipefail
          NODEGROUP_NAME="${{ steps.tf_outputs.outputs.eks_node_group_name }}"
          if [ -z "${NODEGROUP_NAME}" ]; then
            echo "eks_node_group_name output is empty."
            exit 1
          fi
          ASG_NAME=$(aws eks describe-nodegroup \
            --cluster-name "${{ env.EKS_CLUSTER_NAME }}" \
            --nodegroup-name "${NODEGROUP_NAME}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'nodegroup.resources.autoScalingGroups[0].name' \
            --output text)
          MIN_SIZE=$(aws eks describe-nodegroup \
            --cluster-name "${{ env.EKS_CLUSTER_NAME }}" \
            --nodegroup-name "${NODEGROUP_NAME}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'nodegroup.scalingConfig.minSize' \
            --output text)
          MAX_SIZE=$(aws eks describe-nodegroup \
            --cluster-name "${{ env.EKS_CLUSTER_NAME }}" \
            --nodegroup-name "${NODEGROUP_NAME}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'nodegroup.scalingConfig.maxSize' \
            --output text)
          if [ -z "${ASG_NAME}" ] || [ "${ASG_NAME}" = "None" ]; then
            echo "Unable to resolve ASG name for node group: ${NODEGROUP_NAME}"
            exit 1
          fi
          echo "asg_name=${ASG_NAME}" >> "$GITHUB_OUTPUT"
          echo "min_size=${MIN_SIZE}" >> "$GITHUB_OUTPUT"
          echo "max_size=${MAX_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Install/Upgrade Metrics Server
        run: |
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
          helm repo update
          helm upgrade --install metrics-server metrics-server/metrics-server \
            --namespace kube-system \
            --set "args[0]=--kubelet-insecure-tls" \
            --wait \
            --timeout 10m
          kubectl rollout status deployment/metrics-server -n kube-system --timeout=5m

      - name: Install/Upgrade AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="${{ env.EKS_CLUSTER_NAME }}" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set enableServiceMutatorWebhook=false \
            --set-string serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn="${{ steps.tf_outputs.outputs.aws_load_balancer_controller_irsa_role_arn }}" \
            --set region="${{ env.AWS_REGION }}" \
            --set vpcId="${{ steps.tf_outputs.outputs.vpc_id }}" \
            --wait \
            --wait-for-jobs \
            --timeout 10m
          kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=5m

      - name: Ensure AWS LB Webhook CA Bundle Is Synced
        run: |
          set -euo pipefail

          # aws-load-balancer-controller chart stores webhook cert here in current chart versions.
          CA_BUNDLE="$(kubectl get secret aws-load-balancer-tls -n kube-system -o jsonpath='{.data.ca\.crt}' 2>/dev/null || true)"
          if [ -z "${CA_BUNDLE}" ]; then
            echo "aws-load-balancer-tls secret not found; skipping CA sync."
            exit 0
          fi

          # Keep webhook configuration CA bundles aligned with serving cert CA to avoid x509 mismatch races.
          kubectl get validatingwebhookconfiguration aws-load-balancer-webhook -o json \
            | jq --arg ca "${CA_BUNDLE}" '.webhooks |= map(.clientConfig.caBundle=$ca)' \
            | kubectl apply -f -

          kubectl get mutatingwebhookconfiguration aws-load-balancer-webhook -o json \
            | jq --arg ca "${CA_BUNDLE}" '.webhooks |= map(.clientConfig.caBundle=$ca)' \
            | kubectl apply -f -

      - name: Install/Upgrade Cluster Autoscaler
        if: steps.tf_outputs.outputs.cluster_autoscaler_irsa_role_arn != ''
        run: |
          set -euo pipefail
          helm repo add autoscaler https://kubernetes.github.io/autoscaler
          helm repo update
          helm upgrade --install cluster-autoscaler autoscaler/cluster-autoscaler \
            --namespace kube-system \
            --set cloudProvider=aws \
            --set awsRegion="${{ env.AWS_REGION }}" \
            --set rbac.serviceAccount.create=true \
            --set rbac.serviceAccount.name=cluster-autoscaler \
            --set-string rbac.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn="${{ steps.tf_outputs.outputs.cluster_autoscaler_irsa_role_arn }}" \
            --set "autoscalingGroups[0].name=${{ steps.nodegroup_scaling.outputs.asg_name }}" \
            --set "autoscalingGroups[0].minSize=${{ steps.nodegroup_scaling.outputs.min_size }}" \
            --set "autoscalingGroups[0].maxSize=${{ steps.nodegroup_scaling.outputs.max_size }}" \
            --set-string extraArgs.skip-nodes-with-system-pods=false \
            --set-string extraArgs.balance-similar-node-groups=true \
            --wait \
            --timeout 10m
          DEPLOYS="$(kubectl get deployment -n kube-system -l app.kubernetes.io/instance=cluster-autoscaler,app.kubernetes.io/name=aws-cluster-autoscaler -o name)"
          if [ -z "${DEPLOYS}" ]; then
            echo "No cluster-autoscaler deployment found after helm install."
            kubectl get deployment -n kube-system
            exit 1
          fi
          for deploy in ${DEPLOYS}; do
            kubectl rollout status "${deploy}" -n kube-system --timeout=5m
          done

      - name: Adopt Existing Plane Doc Store Secret (if present)
        run: |
          if kubectl get secret "${{ env.PLANE_DOCSTORE_SECRET_NAME }}" -n "${{ env.K8S_NAMESPACE }}" >/dev/null 2>&1; then
            kubectl label secret "${{ env.PLANE_DOCSTORE_SECRET_NAME }}" \
              -n "${{ env.K8S_NAMESPACE }}" \
              app.kubernetes.io/managed-by=Helm \
              --overwrite
            kubectl annotate secret "${{ env.PLANE_DOCSTORE_SECRET_NAME }}" \
              -n "${{ env.K8S_NAMESPACE }}" \
              meta.helm.sh/release-name="${{ env.HELM_RELEASE_NAME }}" \
              meta.helm.sh/release-namespace="${{ env.K8S_NAMESPACE }}" \
              --overwrite
          fi

      - name: Ensure Plane Service Account (IRSA)
        if: env.OBJECT_STORE_MODE == 's3-managed'
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ServiceAccount
          automountServiceAccountToken: true
          metadata:
            name: ${{ env.PLANE_SERVICE_ACCOUNT_NAME }}
            namespace: ${{ env.K8S_NAMESPACE }}
            labels:
              app.kubernetes.io/managed-by: Helm
            annotations:
              meta.helm.sh/release-name: ${{ env.HELM_RELEASE_NAME }}
              meta.helm.sh/release-namespace: ${{ env.K8S_NAMESPACE }}
              eks.amazonaws.com/role-arn: ${{ steps.tf_outputs.outputs.plane_irsa_role_arn }}
          EOF

      - name: Remove Plane Service Account IRSA Annotation
        if: env.OBJECT_STORE_MODE != 's3-managed'
        run: |
          kubectl annotate serviceaccount "${{ env.PLANE_SERVICE_ACCOUNT_NAME }}" \
            -n "${{ env.K8S_NAMESPACE }}" \
            eks.amazonaws.com/role-arn- \
            --overwrite || true

      - name: Build Runtime Helm Values
        id: plane_runtime_values
        env:
          PLANE_PGDB_REMOTE_URL: ${{ secrets.PLANE_PGDB_REMOTE_URL }}
          PLANE_REDIS_URL: ${{ secrets.PLANE_REDIS_URL }}
          PLANE_RABBITMQ_URL: ${{ secrets.PLANE_RABBITMQ_URL }}
          PLANE_DOCSTORE_BUCKET: ${{ vars.PLANE_DOCSTORE_BUCKET || '' }}
          PLANE_EXTERNAL_S3_REGION: ${{ vars.PLANE_EXTERNAL_S3_REGION || vars.AWS_REGION || 'eu-west-1' }}
          PLANE_EXTERNAL_S3_ACCESS_KEY_ID: ${{ secrets.PLANE_EXTERNAL_S3_ACCESS_KEY_ID }}
          PLANE_EXTERNAL_S3_SECRET_ACCESS_KEY: ${{ secrets.PLANE_EXTERNAL_S3_SECRET_ACCESS_KEY }}
          PLANE_S3_ENDPOINT_URL: ${{ secrets.PLANE_S3_ENDPOINT_URL }}
        run: |
          set -euo pipefail

          PLANE_APP_SECRET_ARN="${{ steps.tf_outputs.outputs.plane_app_secret_arn }}"

          require_nonempty() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "$name is required for this service mode."
              exit 1
            fi
          }

          mask_if_set() {
            local value="$1"
            if [ -n "$value" ]; then
              echo "::add-mask::${value}"
            fi
          }

          if [ -z "${PLANE_APP_SECRET_ARN}" ]; then
            echo "plane_app_secret_arn output is empty."
            exit 1
          fi

          PLANE_APP_SECRET_JSON="$(aws secretsmanager get-secret-value \
            --secret-id "${PLANE_APP_SECRET_ARN}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'SecretString' \
            --output text)"

          PLANE_SECRET_KEY="$(echo "${PLANE_APP_SECRET_JSON}" | jq -er '.secret_key')"
          PLANE_LIVE_SERVER_SECRET_KEY="$(echo "${PLANE_APP_SECRET_JSON}" | jq -er '.live_server_secret_key')"
          LOCAL_POSTGRES_PASSWORD="$(echo "${PLANE_APP_SECRET_JSON}" | jq -er '.postgres_password')"
          LOCAL_RABBITMQ_PASSWORD="$(echo "${PLANE_APP_SECRET_JSON}" | jq -er '.rabbitmq_password')"
          LOCAL_MINIO_ROOT_PASSWORD="$(echo "${PLANE_APP_SECRET_JSON}" | jq -er '.minio_root_password')"

          POSTGRES_LOCAL_SETUP="false"
          REDIS_LOCAL_SETUP="false"
          RABBITMQ_LOCAL_SETUP="false"
          MINIO_LOCAL_SETUP="false"
          PGDB_REMOTE_URL=""
          REDIS_URL=""
          AMQP_URL=""
          DOCSTORE_BUCKET=""
          AWS_ACCESS_KEY_ID_VALUE=""
          AWS_SECRET_ACCESS_KEY_VALUE=""
          AWS_S3_ENDPOINT_URL_VALUE=""
          AWS_REGION_VALUE="${{ env.AWS_REGION }}"

          if [ "${POSTGRES_MODE}" = "aws-managed" ]; then
            RDS_SECRET_ARN="${{ steps.tf_outputs.outputs.rds_credentials_secret_arn }}"
            require_nonempty "rds_credentials_secret_arn" "${RDS_SECRET_ARN}"
            RDS_SECRET_JSON="$(aws secretsmanager get-secret-value --secret-id "${RDS_SECRET_ARN}" --region "${{ env.AWS_REGION }}" --query 'SecretString' --output text)"
            DB_HOST="$(echo "${RDS_SECRET_JSON}" | jq -er '.host')"
            DB_PORT="$(echo "${RDS_SECRET_JSON}" | jq -er '.port')"
            DB_NAME="$(echo "${RDS_SECRET_JSON}" | jq -er '.database')"
            DB_USER="$(echo "${RDS_SECRET_JSON}" | jq -er '.username')"
            DB_PASS="$(echo "${RDS_SECRET_JSON}" | jq -er '.password')"
            mask_if_set "${DB_PASS}"
            DB_USER_URI="$(printf '%s' "${DB_USER}" | jq -sRr @uri)"
            DB_PASS_URI="$(printf '%s' "${DB_PASS}" | jq -sRr @uri)"
            PGDB_REMOTE_URL="postgresql://${DB_USER_URI}:${DB_PASS_URI}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
          elif [ "${POSTGRES_MODE}" = "external" ]; then
            require_nonempty "PLANE_PGDB_REMOTE_URL" "${PLANE_PGDB_REMOTE_URL}"
            PGDB_REMOTE_URL="${PLANE_PGDB_REMOTE_URL}"
          else
            POSTGRES_LOCAL_SETUP="true"
          fi

          if [ "${REDIS_MODE}" = "aws-managed" ]; then
            REDIS_SECRET_ARN="${{ steps.tf_outputs.outputs.redis_credentials_secret_arn }}"
            require_nonempty "redis_credentials_secret_arn" "${REDIS_SECRET_ARN}"
            REDIS_SECRET_JSON="$(aws secretsmanager get-secret-value --secret-id "${REDIS_SECRET_ARN}" --region "${{ env.AWS_REGION }}" --query 'SecretString' --output text)"
            REDIS_ENDPOINT="$(echo "${REDIS_SECRET_JSON}" | jq -er '.endpoint')"
            REDIS_PORT="$(echo "${REDIS_SECRET_JSON}" | jq -er '.port')"
            REDIS_AUTH_TOKEN="$(echo "${REDIS_SECRET_JSON}" | jq -er '.auth_token')"
            mask_if_set "${REDIS_AUTH_TOKEN}"
            REDIS_AUTH_TOKEN_URI="$(printf '%s' "${REDIS_AUTH_TOKEN}" | jq -sRr @uri)"
            REDIS_URL="rediss://:${REDIS_AUTH_TOKEN_URI}@${REDIS_ENDPOINT}:${REDIS_PORT}/0"
          elif [ "${REDIS_MODE}" = "external" ]; then
            require_nonempty "PLANE_REDIS_URL" "${PLANE_REDIS_URL}"
            REDIS_URL="${PLANE_REDIS_URL}"
          else
            REDIS_LOCAL_SETUP="true"
          fi

          if [ "${RABBITMQ_MODE}" = "aws-managed" ]; then
            RABBIT_SECRET_ARN="${{ steps.tf_outputs.outputs.rabbitmq_credentials_secret_arn }}"
            require_nonempty "rabbitmq_credentials_secret_arn" "${RABBIT_SECRET_ARN}"
            RABBIT_SECRET_JSON="$(aws secretsmanager get-secret-value --secret-id "${RABBIT_SECRET_ARN}" --region "${{ env.AWS_REGION }}" --query 'SecretString' --output text)"
            RABBIT_ENDPOINT="$(echo "${RABBIT_SECRET_JSON}" | jq -er '.endpoint')"
            RABBIT_USERNAME="$(echo "${RABBIT_SECRET_JSON}" | jq -er '.username')"
            RABBIT_PASSWORD="$(echo "${RABBIT_SECRET_JSON}" | jq -er '.password')"
            mask_if_set "${RABBIT_PASSWORD}"
            RABBIT_HOSTPORT="${RABBIT_ENDPOINT#*://}"
            RABBIT_USERNAME_URI="$(printf '%s' "${RABBIT_USERNAME}" | jq -sRr @uri)"
            RABBIT_PASSWORD_URI="$(printf '%s' "${RABBIT_PASSWORD}" | jq -sRr @uri)"
            AMQP_URL="amqps://${RABBIT_USERNAME_URI}:${RABBIT_PASSWORD_URI}@${RABBIT_HOSTPORT}/"
          elif [ "${RABBITMQ_MODE}" = "external" ]; then
            require_nonempty "PLANE_RABBITMQ_URL" "${PLANE_RABBITMQ_URL}"
            AMQP_URL="${PLANE_RABBITMQ_URL}"
          else
            RABBITMQ_LOCAL_SETUP="true"
          fi

          if [ "${OBJECT_STORE_MODE}" = "s3-managed" ]; then
            DOCSTORE_BUCKET="${{ steps.tf_outputs.outputs.plane_docstore_bucket_name }}"
            require_nonempty "plane_docstore_bucket_name" "${DOCSTORE_BUCKET}"
            AWS_S3_ENDPOINT_URL_VALUE="${PLANE_S3_ENDPOINT_URL:-}"
          elif [ "${OBJECT_STORE_MODE}" = "external-s3" ]; then
            DOCSTORE_BUCKET="${PLANE_DOCSTORE_BUCKET}"
            AWS_REGION_VALUE="${PLANE_EXTERNAL_S3_REGION}"
            AWS_ACCESS_KEY_ID_VALUE="${PLANE_EXTERNAL_S3_ACCESS_KEY_ID}"
            AWS_SECRET_ACCESS_KEY_VALUE="${PLANE_EXTERNAL_S3_SECRET_ACCESS_KEY}"
            AWS_S3_ENDPOINT_URL_VALUE="${PLANE_S3_ENDPOINT_URL:-}"
            require_nonempty "PLANE_DOCSTORE_BUCKET" "${DOCSTORE_BUCKET}"
            require_nonempty "PLANE_EXTERNAL_S3_ACCESS_KEY_ID" "${AWS_ACCESS_KEY_ID_VALUE}"
            require_nonempty "PLANE_EXTERNAL_S3_SECRET_ACCESS_KEY" "${AWS_SECRET_ACCESS_KEY_VALUE}"
          else
            MINIO_LOCAL_SETUP="true"
            DOCSTORE_BUCKET="${PLANE_DOCSTORE_BUCKET:-uploads}"
          fi

          mask_if_set "${PGDB_REMOTE_URL}"
          mask_if_set "${REDIS_URL}"
          mask_if_set "${AMQP_URL}"
          mask_if_set "${AWS_ACCESS_KEY_ID_VALUE}"
          mask_if_set "${AWS_SECRET_ACCESS_KEY_VALUE}"
          mask_if_set "${PLANE_SECRET_KEY}"
          mask_if_set "${PLANE_LIVE_SERVER_SECRET_KEY}"
          mask_if_set "${LOCAL_POSTGRES_PASSWORD}"
          mask_if_set "${LOCAL_RABBITMQ_PASSWORD}"
          mask_if_set "${LOCAL_MINIO_ROOT_PASSWORD}"

          export POSTGRES_LOCAL_SETUP REDIS_LOCAL_SETUP RABBITMQ_LOCAL_SETUP MINIO_LOCAL_SETUP
          export PGDB_REMOTE_URL REDIS_URL AMQP_URL DOCSTORE_BUCKET AWS_REGION_VALUE AWS_ACCESS_KEY_ID_VALUE AWS_SECRET_ACCESS_KEY_VALUE AWS_S3_ENDPOINT_URL_VALUE
          export PLANE_SECRET_KEY PLANE_LIVE_SERVER_SECRET_KEY LOCAL_POSTGRES_PASSWORD LOCAL_RABBITMQ_PASSWORD LOCAL_MINIO_ROOT_PASSWORD

          python <<'PY'
          import json
          import os

          def as_bool(name):
              return os.environ[name].lower() == "true"

          values = {
              "plane-ce": {
                  "postgres": {
                      "local_setup": as_bool("POSTGRES_LOCAL_SETUP"),
                  },
                  "redis": {
                      "local_setup": as_bool("REDIS_LOCAL_SETUP"),
                  },
                  "rabbitmq": {
                      "local_setup": as_bool("RABBITMQ_LOCAL_SETUP"),
                  },
                  "minio": {
                      "local_setup": as_bool("MINIO_LOCAL_SETUP"),
                  },
                  "env": {
                      "secret_key": os.environ["PLANE_SECRET_KEY"],
                      "live_server_secret_key": os.environ["PLANE_LIVE_SERVER_SECRET_KEY"],
                  },
              }
          }

          plane = values["plane-ce"]
          env = plane["env"]

          if plane["postgres"]["local_setup"]:
              env["pgdb_username"] = "plane"
              env["pgdb_password"] = os.environ["LOCAL_POSTGRES_PASSWORD"]
              env["pgdb_name"] = "plane"
          elif os.environ["PGDB_REMOTE_URL"]:
              env["pgdb_remote_url"] = os.environ["PGDB_REMOTE_URL"]

          if not plane["redis"]["local_setup"] and os.environ["REDIS_URL"]:
              env["remote_redis_url"] = os.environ["REDIS_URL"]

          if plane["rabbitmq"]["local_setup"]:
              plane["rabbitmq"]["default_user"] = "plane"
              plane["rabbitmq"]["default_password"] = os.environ["LOCAL_RABBITMQ_PASSWORD"]
          elif os.environ["AMQP_URL"]:
              plane["rabbitmq"]["external_rabbitmq_url"] = os.environ["AMQP_URL"]

          if plane["minio"]["local_setup"]:
              plane["minio"]["root_user"] = "admin"
              plane["minio"]["root_password"] = os.environ["LOCAL_MINIO_ROOT_PASSWORD"]
              env["docstore_bucket"] = os.environ["DOCSTORE_BUCKET"]
          else:
              env["docstore_bucket"] = os.environ["DOCSTORE_BUCKET"]
              env["aws_region"] = os.environ["AWS_REGION_VALUE"]
              env["aws_access_key"] = os.environ["AWS_ACCESS_KEY_ID_VALUE"]
              env["aws_secret_access_key"] = os.environ["AWS_SECRET_ACCESS_KEY_VALUE"]
              env["aws_s3_endpoint_url"] = os.environ["AWS_S3_ENDPOINT_URL_VALUE"]

          with open("/tmp/plane-runtime-values.json", "w", encoding="utf-8") as f:
              json.dump(values, f)
          PY

          echo "runtime_values_file=/tmp/plane-runtime-values.json" >> "$GITHUB_OUTPUT"

      - name: Helm Upgrade/Install
        run: |
          set -euo pipefail

          helm_set_args=(
            --set-string "plane-ce.external_secrets.doc_store_existingSecret=${{ env.PLANE_DOCSTORE_SECRET_NAME }}"
          )

          if [ -n "${{ env.PLANE_APP_HOST }}" ]; then
            helm_set_args+=(--set-string "plane-ce.ingress.appHost=${{ env.PLANE_APP_HOST }}")
          fi

          helm upgrade --install "${{ env.HELM_RELEASE_NAME }}" "${{ env.HELM_CHART_DIR }}" \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --values "${{ env.HELM_VALUES_FILE }}" \
            --values "${{ steps.plane_runtime_values.outputs.runtime_values_file }}" \
            "${helm_set_args[@]}" \
            --rollback-on-failure \
            --wait \
            --wait-for-jobs \
            --timeout 20m

      - name: Annotate Plane Service Account (IRSA)
        if: env.OBJECT_STORE_MODE == 's3-managed'
        run: |
          kubectl annotate serviceaccount "${{ env.PLANE_SERVICE_ACCOUNT_NAME }}" \
            -n "${{ env.K8S_NAMESPACE }}" \
            eks.amazonaws.com/role-arn="${{ steps.tf_outputs.outputs.plane_irsa_role_arn }}" \
            --overwrite

      - name: Restart Plane Workloads After IRSA Annotation
        if: env.OBJECT_STORE_MODE == 's3-managed'
        run: |
          for deploy in "${{ env.HELM_RELEASE_NAME }}-api-wl" "${{ env.HELM_RELEASE_NAME }}-live-wl" "${{ env.HELM_RELEASE_NAME }}-worker-wl" "${{ env.HELM_RELEASE_NAME }}-beat-worker-wl" "${{ env.HELM_RELEASE_NAME }}-web-wl" "${{ env.HELM_RELEASE_NAME }}-admin-wl" "${{ env.HELM_RELEASE_NAME }}-space-wl"; do
            kubectl rollout restart "deployment/${deploy}" -n "${{ env.K8S_NAMESPACE }}" || true
          done
          for deploy in "${{ env.HELM_RELEASE_NAME }}-api-wl" "${{ env.HELM_RELEASE_NAME }}-live-wl" "${{ env.HELM_RELEASE_NAME }}-worker-wl" "${{ env.HELM_RELEASE_NAME }}-beat-worker-wl" "${{ env.HELM_RELEASE_NAME }}-web-wl" "${{ env.HELM_RELEASE_NAME }}-admin-wl" "${{ env.HELM_RELEASE_NAME }}-space-wl"; do
            kubectl rollout status "deployment/${deploy}" -n "${{ env.K8S_NAMESPACE }}" --timeout=5m || true
          done

