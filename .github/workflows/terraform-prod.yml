name: Terraform Prod

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-prod.yml'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-prod.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan

env:
  TF_DIR: terraform/environments/prod
  AWS_REGION: eu-west-1

concurrency:
  group: terraform-prod-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  validate-plan:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure RDS Service-Linked Role
        run: |
          set -euo pipefail
          if aws iam get-role --role-name AWSServiceRoleForRDS >/dev/null 2>&1; then
            echo "AWSServiceRoleForRDS already exists."
          else
            echo "Creating AWSServiceRoleForRDS..."
            aws iam create-service-linked-role --aws-service-name rds.amazonaws.com
          fi

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init -input=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: Terraform Plan
        run: terraform -chdir=${{ env.TF_DIR }} plan -input=false -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan

  apply:
    if: github.event_name == 'push'
    needs: validate-plan
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init -input=false

      - name: Terraform Apply
        run: terraform -chdir=${{ env.TF_DIR }} apply -input=false -auto-approve
