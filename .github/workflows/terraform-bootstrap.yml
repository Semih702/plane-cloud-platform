name: Terraform Bootstrap

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Bootstrap action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

env:
  TF_DIR: terraform/environments/bootstrap
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || '' }}
  TF_STATE_BUCKET_PREFIX: ${{ vars.TF_STATE_BUCKET_PREFIX || 'plane-cloud-platform-tfstate' }}
  TF_LOCK_TABLE_NAME: ${{ vars.TF_LOCK_TABLE_NAME || 'plane-cloud-platform-tf-locks' }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-bootstrap-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init -input=false

      - name: Import Existing Bootstrap Resources
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="${TF_STATE_BUCKET:-${{ env.TF_STATE_BUCKET_PREFIX }}-${ACCOUNT_ID}}"
          tf_var_args=(
            -var="aws_region=${{ env.AWS_REGION }}"
            -var="state_bucket_name=${STATE_BUCKET}"
            -var="lock_table_name=${{ env.TF_LOCK_TABLE_NAME }}"
          )

          import_if_available() {
            local address="$1"
            local id="$2"
            if terraform -chdir=${{ env.TF_DIR }} state show "$address" >/dev/null 2>&1; then
              return 0
            fi
            terraform -chdir=${{ env.TF_DIR }} import -input=false "${tf_var_args[@]}" "$address" "$id" || true
          }

          if aws s3api head-bucket --bucket "${STATE_BUCKET}" >/dev/null 2>&1; then
            import_if_available aws_s3_bucket.tf_state "${STATE_BUCKET}"
            import_if_available aws_s3_bucket_versioning.tf_state "${STATE_BUCKET}"
            import_if_available aws_s3_bucket_server_side_encryption_configuration.tf_state "${STATE_BUCKET}"
            import_if_available aws_s3_bucket_public_access_block.tf_state "${STATE_BUCKET}"
          fi

          if aws dynamodb describe-table --table-name "${{ env.TF_LOCK_TABLE_NAME }}" >/dev/null 2>&1; then
            import_if_available aws_dynamodb_table.tf_locks "${{ env.TF_LOCK_TABLE_NAME }}"
          fi

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: Terraform Plan
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="${TF_STATE_BUCKET:-${{ env.TF_STATE_BUCKET_PREFIX }}-${ACCOUNT_ID}}"
          terraform -chdir=${{ env.TF_DIR }} plan -input=false -out=tfplan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="state_bucket_name=${STATE_BUCKET}" \
            -var="lock_table_name=${{ env.TF_LOCK_TABLE_NAME }}"

  apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init -input=false

      - name: Import Existing Bootstrap Resources
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="${TF_STATE_BUCKET:-${{ env.TF_STATE_BUCKET_PREFIX }}-${ACCOUNT_ID}}"
          tf_var_args=(
            -var="aws_region=${{ env.AWS_REGION }}"
            -var="state_bucket_name=${STATE_BUCKET}"
            -var="lock_table_name=${{ env.TF_LOCK_TABLE_NAME }}"
          )

          import_if_available() {
            local address="$1"
            local id="$2"
            if terraform -chdir=${{ env.TF_DIR }} state show "$address" >/dev/null 2>&1; then
              return 0
            fi
            terraform -chdir=${{ env.TF_DIR }} import -input=false "${tf_var_args[@]}" "$address" "$id" || true
          }

          if aws s3api head-bucket --bucket "${STATE_BUCKET}" >/dev/null 2>&1; then
            import_if_available aws_s3_bucket.tf_state "${STATE_BUCKET}"
            import_if_available aws_s3_bucket_versioning.tf_state "${STATE_BUCKET}"
            import_if_available aws_s3_bucket_server_side_encryption_configuration.tf_state "${STATE_BUCKET}"
            import_if_available aws_s3_bucket_public_access_block.tf_state "${STATE_BUCKET}"
          fi

          if aws dynamodb describe-table --table-name "${{ env.TF_LOCK_TABLE_NAME }}" >/dev/null 2>&1; then
            import_if_available aws_dynamodb_table.tf_locks "${{ env.TF_LOCK_TABLE_NAME }}"
          fi

      - name: Terraform Apply
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_BUCKET="${TF_STATE_BUCKET:-${{ env.TF_STATE_BUCKET_PREFIX }}-${ACCOUNT_ID}}"
          terraform -chdir=${{ env.TF_DIR }} apply -input=false -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="state_bucket_name=${STATE_BUCKET}" \
            -var="lock_table_name=${{ env.TF_LOCK_TABLE_NAME }}"
