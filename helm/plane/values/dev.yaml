autoscaling:
  enabled: true
  targetCPUUtilizationPercentage: 80
  web:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  api:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  worker:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  beatworker:
    enabled: true
    minReplicas: 1
    maxReplicas: 1

ingress:
  enabled: true
  ingressClass: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTP":3000}]'

plane-ce:
  external_secrets:
    doc_store_existingSecret: plane-doc-store-secrets

  postgres:
    local_setup: false

  redis:
    local_setup: false

  rabbitmq:
    local_setup: false
    external_rabbitmq_url: ""

  minio:
    local_setup: false

  env:
    # Set by CI from Terraform RDS output.
    pgdb_remote_url: ""
    # Set by CI from Terraform ElastiCache output.
    remote_redis_url: ""
    # Set by CI from Terraform S3 output.
    docstore_bucket: ""
    aws_region: "eu-west-1"
    aws_s3_endpoint_url: "https://s3.eu-west-1.amazonaws.com"
    # Set by CI from Terraform-managed AWS Secrets Manager value.
    secret_key: ""
    live_server_secret_key: ""

  ingress:
    # The upstream chart only renders host-based ingress. The wrapper chart renders
    # the portable ALB ingress instead, using this host only when it is set.
    enabled: false
    appHost: ""

  ssl:
    createIssuer: false
    generateCerts: false

  web:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  api:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  worker:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  beatworker:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi
