autoscaling:
  enabled: true
  targetCPUUtilizationPercentage: 80
  web:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  api:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  worker:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
  beatworker:
    enabled: true
    minReplicas: 1
    maxReplicas: 1

plane-ce:
  external_secrets:
    doc_store_existingSecret: ""

  postgres:
    local_setup: false

  redis:
    local_setup: false

  rabbitmq:
    local_setup: false
    external_rabbitmq_url: ""

  minio:
    local_setup: false

  env:
    # Set by CI from Terraform RDS output.
    pgdb_remote_url: ""
    # Set by CI from Terraform ElastiCache output.
    remote_redis_url: ""
    docstore_bucket: ""
    aws_region: ""
    aws_s3_endpoint_url: ""

  ingress:
    enabled: true
    # CI injects PLANE_APP_HOST when set. If it is empty, CI first deploys with
    # a bootstrap host and then adopts the generated ALB hostname automatically.
    appHost: ""
    ingressClass: alb
    ingress_annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      # Temporary workaround until custom domain + TLS are in place.
      # Keeps legacy redirects that target :3000 reachable.
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTP":3000}]'

  ssl:
    createIssuer: false
    generateCerts: false

  web:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  api:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  worker:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  beatworker:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi
