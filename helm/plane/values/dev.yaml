plane-ce:
  external_secrets:
    doc_store_existingSecret: plane-dev-doc-store-secrets

  postgres:
    storageClass: gp3-csi

  redis:
    storageClass: gp3-csi

  rabbitmq:
    storageClass: gp3-csi

  minio:
    local_setup: false

  env:
    docstore_bucket: "plane-dev-uploads"
    aws_region: "eu-west-1"
    aws_s3_endpoint_url: ""

  ingress:
    enabled: true
    appHost: plane-dev.example.com
    ingressClass: alb
    ingress_annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'

  ssl:
    createIssuer: false
    generateCerts: false

  web:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  api:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  worker:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi

  beatworker:
    replicas: 1
    cpuRequest: 100m
    memoryRequest: 128Mi
    cpuLimit: 500m
    memoryLimit: 512Mi
