# Base values shared across environments.
# Environment-specific overrides live under values/*.yaml
storageClass:
  create: true
  name: gp3-csi
  defaultClass: false
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  allowVolumeExpansion: true
  type: gp3
  fsType: ext4

autoscaling:
  enabled: true
  targetCPUUtilizationPercentage: 80
  web:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
  api:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
  worker:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
  beatworker:
    enabled: true
    minReplicas: 1
    maxReplicas: 2

plane-ce: {}
