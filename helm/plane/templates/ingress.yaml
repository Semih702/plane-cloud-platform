{{- if .Values.ingress.enabled }}
{{- $wrapperIngress := .Values.ingress | default dict -}}
{{- $plane := index .Values "plane-ce" | default dict -}}
{{- $planeIngress := $plane.ingress | default dict -}}
{{- $planeEnv := $plane.env | default dict -}}
{{- $planeMinio := $plane.minio | default dict -}}
{{- $appHost := $planeIngress.appHost | default "" -}}
{{- $annotations := $wrapperIngress.annotations | default dict -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-ingress
  {{- if gt (len $annotations) 0 }}
  annotations:
    {{- range $key, $value := $annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ ($wrapperIngress.ingressClass | default "alb") | quote }}
  rules:
    -
      {{- if $appHost }}
      host: {{ $appHost | quote }}
      {{- end }}
      http:
        paths:
          - backend:
              service:
                port:
                  number: 3000
                name: {{ .Release.Name }}-web
            path: /
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 8000
                name: {{ .Release.Name }}-api
            path: /api
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 8000
                name: {{ .Release.Name }}-api
            path: /auth
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 3000
                name: {{ .Release.Name }}-live
            path: /live/
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 3000
                name: {{ .Release.Name }}-space
            path: /spaces
            pathType: Prefix
          - backend:
              service:
                port:
                  number: 3000
                name: {{ .Release.Name }}-admin
            path: /god-mode
            pathType: Prefix
          {{- if and $planeMinio.local_setup $planeEnv.docstore_bucket }}
          - backend:
              service:
                port:
                  number: 9000
                name: {{ .Release.Name }}-minio
            path: /{{ $planeEnv.docstore_bucket }}
            pathType: Prefix
          {{- end }}
{{- end }}
