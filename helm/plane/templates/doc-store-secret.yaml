{{- /*
Create the Plane doc-store secret from chart values so releases are self-contained.
*/ -}}
{{- $plane := index .Values "plane-ce" -}}
{{- if and $plane $plane.external_secrets }}
{{- $secretName := $plane.external_secrets.doc_store_existingSecret | default (printf "%s-doc-store-secrets" .Release.Name) -}}
{{- $minio := $plane.minio | default dict -}}
{{- $minioLocal := false -}}
{{- if hasKey $minio "local_setup" -}}
{{- $minioLocal = $minio.local_setup -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  FILE_SIZE_LIMIT: "5242880"
  AWS_S3_BUCKET_NAME: {{ (default "" $plane.env.docstore_bucket) | quote }}
  USE_MINIO: {{ ternary "1" "0" $minioLocal | quote }}
  {{- if $minioLocal }}
  MINIO_ROOT_USER: {{ (default "admin" $minio.root_user) | quote }}
  MINIO_ROOT_PASSWORD: {{ (default "password" $minio.root_password) | quote }}
  AWS_ACCESS_KEY_ID: {{ (default "admin" $minio.root_user) | quote }}
  AWS_SECRET_ACCESS_KEY: {{ (default "password" $minio.root_password) | quote }}
  AWS_S3_ENDPOINT_URL: {{ printf "http://%s-minio:9000" .Release.Name | quote }}
  {{- else }}
  AWS_ACCESS_KEY_ID: {{ (default "" $plane.env.aws_access_key) | quote }}
  AWS_SECRET_ACCESS_KEY: {{ (default "" $plane.env.aws_secret_access_key) | quote }}
  AWS_REGION: {{ (default "eu-west-1" $plane.env.aws_region) | quote }}
  {{- if $plane.env.aws_s3_endpoint_url }}
  AWS_S3_ENDPOINT_URL: {{ $plane.env.aws_s3_endpoint_url | quote }}
  {{- end }}
  {{- end }}
{{- end }}
